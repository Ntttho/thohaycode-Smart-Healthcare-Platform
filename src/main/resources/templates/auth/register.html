<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0; }
        .register-card { width: 100%; max-width: 600px; border: none; border-radius: 10px; }
    </style>
</head>
<body>

<div class="register-wrapper">
    <div class="card register-card shadow">
        <div class="card-body p-4 p-md-5">
            <h2 class="text-center mb-4">Đăng Ký Tài Khoản</h2>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/register}" th:object="${request}" method="post" id="registerForm">

                <div class="mb-3">
                    <label for="fullName" class="form-label">Họ và tên <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                           id="fullName" th:field="*{fullName}" placeholder="Nhập đầy đủ họ tên...">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               id="email" th:field="*{email}" placeholder="example@gmail.com">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="phone" class="form-label">Số điện thoại</label>
                        <input type="tel" class="form-control" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                               id="phone" th:field="*{phone}" placeholder="0912345678">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="dob" class="form-label">Ngày sinh</label>
                        <input type="date" class="form-control" th:field="*{dob}" id="dob">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="gender" class="form-label">Giới tính</label>
                        <select class="form-select" th:field="*{gender}" id="gender">
                            <option value="">Chọn giới tính...</option>
                            <option value="Male">Nam</option>
                            <option value="Female">Nữ</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                           id="password" th:field="*{password}" placeholder="Tạo mật khẩu...">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Nhập lại mật khẩu...">
                    <div class="invalid-feedback">Mật khẩu không khớp!</div>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">Đăng Ký</button>
                </div>
            </form>
        <div class="text-center">

            <span class="text-muted">Đã có tài khoản?</span>

            <a th:href="@{/login}" class="text-decoration-none">Đăng nhập ngay</a>

        </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', function(event) {
        var password = document.getElementById('password');
        var confirmPassword = document.getElementById('confirmPassword');
        if (password.value !== confirmPassword.value) {
            event.preventDefault();
            confirmPassword.classList.add('is-invalid');
        } else {
            confirmPassword.classList.remove('is-invalid');
        }
    });
</script>

</body>
</html>
