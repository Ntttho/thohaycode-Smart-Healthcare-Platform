<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Đăng nhập hệ thống</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <!-- Thêm một chút CSS để căn giữa form đăng nhập -->
    <style>
        body {
            background-color: #f8f9fa; /* Màu nền xám nhạt */
        }
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="card login-card shadow">
        <div class="card-body p-4">
            <h2 class="text-center mb-4">Đăng Nhập</h2>

            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <p th:text="${errorMessage}"></p>
            </div>

            <!-- Hiển thị thông báo đăng xuất thành công -->
            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                Bạn đã đăng xuất thành công.
            </div>
            <div th:if="${param.success}" class="alert alert-success" role="alert">
                Bạn đã đăng ký thành công.
            </div>

            <!-- Form đăng nhập với Thymeleaf action -->
            <form th:action="@{/login}" th:object="${request}" method="post">

                <div class="mb-3">
                    <label for="email" class="form-label">Nhập email</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}"
                           placeholder="name@hospital.com" required autofocus>
                    <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="password" th:field="*{password}"
                           placeholder="Nhập mật khẩu..." required>
                    <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Đăng Nhập</button>
                </div>
            </form>
        </div>
        <div class="text-center mb-4">
            <span class="text-muted">Chưa có tài khoản?</span>
            <a th:href="@{/register}" class="text-decoration-none">Đăng ký ngay</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
