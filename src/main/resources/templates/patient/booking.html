<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đặt Lịch Khám</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Đăng ký lịch khám</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/patient/appointment/create/{deptId}(deptId=${departmentId})}"
                          method="post" th:object="${appointment}">

                        <input type="hidden" name="departmentId" th:value="${departmentId}" />

                        <!-- Chọn Bác sĩ -->
                        <div class="mb-3">
                            <label>Chọn bác sĩ:</label>
                            <select th:field="*{doctorId}" class="form-select" required>
                                <option value="">-- Chọn bác sĩ --</option>
                                <option th:each="doc : ${doctors}" th:value="${doc.id}" th:text="${doc.fullName}"></option>
                            </select>
                        </div>

                        <!-- Chọn Ngày & Giờ Bắt Đầu -->
                        <div class="mb-3">
                            <label>Thời gian bắt đầu:</label>
                            <input type="datetime-local" th:field="*{startTime}" class="form-control" required>
                        </div>

                        <!-- Lý do khám -->
                        <div class="mb-3">
                            <label>Lý do khám:</label>
                            <textarea th:field="*{reasonForVisit}" class="form-control" rows="2"></textarea>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Xác nhận đặt lịch</button>
                        <a class="text-decoration-none text-light btn btn-dark w-100 mt-2" href="/patient/home">Quay lại</a>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const now = new Date();
    const minDate = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    document.querySelector('input[type="datetime-local"]').setAttribute('min', minDate);
</script>
</body>
</html>
