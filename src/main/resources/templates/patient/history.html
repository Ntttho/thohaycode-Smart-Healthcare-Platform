<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>history appointment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{fragment/fragment :: header-patient}"></div>
<div class="container mt-5">
    <h2>Lịch hẹn của tôi</h2>
    <hr>

    <table class="table table-hover mt-4">
        <thead class="table-light">
        <tr>
            <th>Bác sĩ</th>
            <th>Lý do</th>
            <th>Ngày và giờ</th>
            <th>Trạng thái</th>
        </tr>
        </thead>
        <tbody>
        <!-- Thymeleaf loop to iterate through appointments -->
        <tr th:each="appt : ${appointments}">
            <td th:text="${appt.doctor.fullName}">Dr. Name</td>
            <td th:text="${appt.reasonForVisit}">Reason</td>
            <td>
                <span th:text="${#temporals.format(appt.startAt, 'yyyy-MM-dd HH:mm')}">Date</span>
            </td>
            <td>
                <span class="badge"
                      th:classappend="${#strings.equalsIgnoreCase(appt.status, 'COMPLETED') ? 'bg-success' : (#strings.equalsIgnoreCase(appt.status, 'CANCELLED') ? 'bg-danger' : (#strings.equalsIgnoreCase(appt.status, 'PENDING') ? 'bg-warning text-dark' : 'bg-info'))}"
                      th:text="${appt.status}">Status</span>
            </td>

            <td class="text-center">

                <a th:if="${#strings.equalsIgnoreCase(appt.status, 'COMPLETED')}"
                   th:href="@{/patient/prescription/{appointmentId}(appointmentId=${appt.id})}"
                   class="btn btn-sm btn-info text-white me-2">
                    <i class="bi bi-file-earmark-medical"></i> Xem chi tiết
                </a>

                <form th:if="${#strings.equalsIgnoreCase(appt.status, 'PENDING')}"
                      th:action="@{/patient/appointments/cancel/{id}(id=${appt.id})}"
                      method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Bạn có chắc chắn muốn hủy lịch hẹn này không? Hành động này không thể hoàn tác.');">
                        <i class="bi bi-trash"></i> Hủy lịch
                    </button>
                </form>

            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(appointments)}">
            <td colspan="4" class="text-center">Bạn chưa có đặt lịch nào</td>
        </tr>


        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
