<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{fragment/fragment :: header-patient}"></div>

<div class="container py-5">
    <h2 class="text-center mb-4">Danh sách Chuyên khoa</h2>
    <div class="row">
        <!-- Duyệt qua danh sách các khoa -->
        <div class="col-md-4 mb-3" th:each="dept : ${departments}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${dept.name}">Tên Khoa</h5>
                    <p th:text="${dept.description}">Mô tả</p>
                    <a th:href="@{/patient/appointment/booking/{departmentId}(departmentId=${dept.id})}"
                       class="btn btn-primary">
                        Đặt lịch khám
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
