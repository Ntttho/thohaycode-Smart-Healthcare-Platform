<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{fragment/fragment :: header-admin}"></div>

<div class="container mt-5">
    <div class="mb-3">
        <a href="/admin/medicine"
           th:classappend="${param.status == null} ? 'btn-primary' : 'btn-outline-primary'"
           class="btn">Danh sách đã duyệt</a>

        <a href="/admin/medicine?status=pending"
           th:classappend="${#strings.equals(param.status, 'pending')} ? 'btn-primary' : 'btn-outline-primary'"
           class="btn">Danh sách chờ duyệt</a>
        <a href="/admin/medicine?status=reject"
           th:classappend="${#strings.equals(param.status, 'reject')} ? 'btn-primary' : 'btn-outline-primary'"
           class="btn">Danh sách bị xóa</a>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Quản lý Thuốc</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#medicineModal">Thêm Thuốc Mới</button>
    </div>

    <!-- Bảng danh sách -->
    <table class="table table-hover table-bordered">
        <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Tên Thuốc</th>
            <th>Số lượng</th>
            <th>Lưu ý sử dụng</th>
            <th>Mô tả</th>
            <th>Danh mục</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="medicine : ${medicines}">
            <td th:text="${medicine.id}">1</td>
            <td th:text="${medicine.name}">Paracetamol</td>
            <td th:text="${medicine.amount}">Paracetamol</td>
            <td th:text="${medicine.precaution}">...</td>
            <td th:text="${medicine.description}">...</td>
            <td th:text="${medicine.category.name}">Giảm đau</td>
            <td>
        <span th:classappend="${medicine.isApproved == 'approved' ? 'bg-success' : (medicine.isApproved == 'pending' ? 'bg-warning text-dark' : 'bg-danger')}"
              class="badge" th:text="${medicine.isApproved}"></span>
            </td>
            <td>
                <!-- Nút Sửa: dùng data-attribute để chứa thông tin -->
                <button class="btn btn-sm btn-warning"
                        data-bs-toggle="modal"
                        data-bs-target="#medicineModal"
                        th:data-id="${medicine.id}"
                        th:data-name="${medicine.name}"
                        th:data-precaution="${medicine.precaution}"
                        th:data-description="${medicine.description}"
                        th:data-amount="${medicine.amount}"
                        th:data-category="${medicine.category.id}"
                        th:data-approved="${medicine.isApproved}"
                        onclick="editMedicine(this)">Sửa</button>

                <!-- Nút Xóa: thẻ a chuyển hướng -->
                <a th:if="${!medicine.isApproved.equals('reject')}" th:href="@{/admin/medicine/delete/{id}(id=${medicine.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Modal -->
<div class="modal fade" id="medicineModal" tabindex="-1" aria-labelledby="medicineModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <form th:action="@{/admin/medicine/save}" th:object="${medicineRequest}" method="POST" class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="medicineModalLabel">Thông tin Thuốc</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" name="id" th:field="*{id}" id="medicineId">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tên Thuốc <span class="text-danger">*</span></label>
                        <input type="text" name="name" th:field="*{name}" class="form-control" required placeholder="Nhập tên thuốc">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Danh mục <span class="text-danger">*</span></label>
                        <select name="categoryId" th:field="*{categoryId}" class="form-select" required>
<!--                            <option value="">&#45;&#45; Chọn danh mục &#45;&#45;</option>-->
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tên Thuốc <span class="text-danger">*</span></label>
                    <input type="text" name="amount" th:field="*{amount}" class="form-control" required placeholder="Nhập số lượng">
                </div>

                <div class="mb-3">
                    <label class="form-label">Thận trọng (Precaution)</label>
                    <textarea name="precaution" class="form-control" rows="3"
                              placeholder="Các lưu ý, tác dụng phụ hoặc cảnh báo..."
                              th:field="*{precaution}"
                    ></textarea>
                </div>


                <div class="mb-3">
                    <label class="form-label">Mô tả chi tiết (Description)</label>
                    <textarea name="description" class="form-control" rows="5"
                              th:field="*{description}"
                              placeholder="Công dụng, liều dùng, thành phần..."></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Trạng thái duyệt</label>
                    <select name="isApproved" class="form-select" th:field="*{isApproved}">
                        <option value="pending">Chờ duyệt</option>
                        <option value="approved">Đã duyệt</option>
                        <!--                        <option value="reje">Từ chối (Rejected)</option>-->
                    </select>
                </div>


            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                <button type="submit" class="btn btn-primary">Lưu thông tin</button>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
<script>
    const medicineModal = document.getElementById('medicineModal');

    // Reset form khi đóng modal
    medicineModal.addEventListener('hidden.bs.modal', function () {
        document.getElementById('medicineId').value = '';
        medicineModal.querySelector('form').reset();
    });

    function editMedicine(btn) {
        // Lấy dữ liệu từ data-attributes của nút bấm
        const id = btn.getAttribute('data-id');
        const name = btn.getAttribute('data-name');
        const precaution = btn.getAttribute('data-precaution');
        const description = btn.getAttribute('data-description');
        const categoryId = btn.getAttribute('data-category');
        const approved = btn.getAttribute('data-approved');
        const amount = btn.getAttribute('data-amount')

        // Đổ vào các input trong form
        document.getElementById('medicineId').value = id;
        medicineModal.querySelector('input[name="name"]').value = name;
        medicineModal.querySelector('input[name="amount"]').value = amount;
        medicineModal.querySelector('textarea[name="precaution"]').value = precaution;
        medicineModal.querySelector('textarea[name="description"]').value = description;
        medicineModal.querySelector('select[name="categoryId"]').value = categoryId;
        medicineModal.querySelector('select[name="isApproved"]').value = approved;
    }
</script>
</body>
</html>
