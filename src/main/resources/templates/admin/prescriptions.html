<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản Lý Đơn Thuốc - Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        .accordion-button:focus { box-shadow: none; }
        .accordion-button:not(.collapsed) { background-color: #f8f9fa; color: #212529; }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{fragment/fragment :: header-admin}"></div>

<div class="container-fluid mt-4 mb-5 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 text-dark"><i class="bi bi-file-medical"></i> Quản Lý Đơn Thuốc (Admin)</h2>
        <a th:href="@{/admin/home}" class="btn btn-outline-secondary"><i class="bi bi-house"></i> Trang chủ Admin</a>
    </div>

    <!-- Thông báo nếu không có đơn thuốc nào -->
    <div th:if="${#lists.isEmpty(prescriptions)}" class="alert alert-info text-center shadow-sm">
        Hiện tại chưa có đơn thuốc nào trong hệ thống.
    </div>

    <!-- Accordion bọc ngoài -->
    <div class="accordion shadow-sm" id="adminPrescriptionAccordion" th:unless="${#lists.isEmpty(prescriptions)}">

        <div class="accordion-item border rounded mb-2 shadow-sm" th:each="p : ${prescriptions}">

            <!-- HEADER -->
            <h2 class="accordion-header" th:id="'heading' + ${p.id}">
                <button class="accordion-button collapsed bg-white fw-medium" type="button" data-bs-toggle="collapse"
                        th:data-bs-target="'#collapse' + ${p.id}" aria-expanded="false" th:aria-controls="'collapse' + ${p.id}">

                    <div class="d-flex justify-content-between align-items-center w-100 pe-3">
                        <div class="d-flex align-items-center">
                            <span class="badge bg-secondary me-3 fs-6">#<span th:text="${p.id}"></span></span>
                            <div class="me-4 border-end pe-3">
                                <small class="text-muted d-block" style="font-size: 0.75rem;">Bác sĩ kê đơn</small>
                                <span class="text-primary fw-bold" th:text="${p.appointment?.doctor?.fullName ?: 'N/A'}"></span>
                            </div>
                            <div>
                                <small class="text-muted d-block" style="font-size: 0.75rem;">Bệnh nhân</small>
                                <span class="text-dark fw-bold" th:text="${p.appointment?.patient?.fullName ?: 'N/A'}"></span>
                            </div>
                        </div>
                        <div>
                            <span th:if="${p.status == 'pending'}" class="badge bg-warning text-dark px-3 py-2">Chờ duyệt</span>
                            <span th:if="${p.status == 'accepted'}" class="badge bg-success px-3 py-2">Đã Duyệt</span>
                            <span th:if="${p.status == 'rejected'}" class="badge bg-danger px-3 py-2">Đã Hủy</span>
                        </div>
                    </div>
                </button>
            </h2>

            <!-- BODY -->
            <div th:id="'collapse' + ${p.id}" class="accordion-collapse collapse"
                 th:aria-labelledby="'heading' + ${p.id}" data-bs-parent="#adminPrescriptionAccordion">

                <div class="accordion-body bg-light border-top p-4">

                    <!-- VÙNG NÚT BẤM DUYỆT / TỪ CHỐI CHO ADMIN -->
                    <div class="d-flex justify-content-end mb-4 border-bottom pb-3" th:if="${p.status == 'pending'}">

                        <!-- Nút Từ chối -->
                        <form th:action="@{/admin/prescription/update-status/{id}(id=${p.id})}" method="post" class="me-2">
                            <input type="hidden" name="status" value="rejected">
                            <button type="submit" class="btn btn-danger shadow-sm" onclick="return confirm('Bạn có chắc chắn muốn HỦY đơn thuốc này không?');">
                                <i class="bi bi-x-circle"></i> Từ chối Đơn thuốc
                            </button>
                        </form>

                        <!-- Nút Duyệt -->
                        <form th:action="@{/admin/prescription/update-status/{id}(id=${p.id})}" method="post">
                            <input type="hidden" name="status" value="accepted">
                            <button type="submit" class="btn btn-success shadow-sm" onclick="return confirm('Duyệt và xuất thuốc cho đơn này?');">
                                <i class="bi bi-check2-circle"></i> Duyệt Đơn thuốc
                            </button>
                        </form>
                    </div>

                    <!-- Lưới thông tin Chẩn đoán -->
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="p-3 border rounded bg-white shadow-sm h-100">
                                <small class="text-muted text-uppercase fw-bold d-block mb-1">Triệu chứng (Lý do khám)</small>
                                <span class="text-dark" th:text="${p.appointment?.reasonForVisit ?: 'Không có'}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="p-3 border rounded bg-white shadow-sm h-100">
                                <small class="text-muted text-uppercase fw-bold d-block mb-1">Chẩn đoán (Bệnh án)</small>
                                <span class="text-dark fw-bold text-danger" th:text="${p.appointment?.medicalRecord?.diagnosis ?: 'Chưa cập nhật'}"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Bảng chi tiết thuốc -->
                    <h6 class="fw-bold mb-3 text-primary border-bottom pb-2">Danh Sách Thuốc Cần Cấp</h6>
                    <div class="table-responsive shadow-sm">
                        <table class="table table-bordered table-hover bg-white mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="text-center" style="width: 5%">STT</th>
                                <th style="width: 45%">Tên Thuốc</th>
                                <th class="text-center" style="width: 15%">Số Lượng</th>
                                <th style="width: 35%">Liều Dùng</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="detail, iterStat : ${p.prescriptionDetails}">
                                <td class="text-center text-muted" th:text="${iterStat.count}"></td>
                                <td class="fw-bold text-dark" th:text="${detail.medicine?.name}"></td>
                                <td class="text-center fw-bold text-primary" th:text="${detail.quantity}"></td>
                                <td th:text="${detail.dosage}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(p.prescriptionDetails)}">
                                <td colspan="4" class="text-center text-muted py-3">Chưa có loại thuốc nào trong đơn này.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
