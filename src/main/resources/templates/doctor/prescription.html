<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Lịch sử Kê Đơn</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!-- Thêm icon (tùy chọn để giao diện đẹp hơn) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">

    <style>
        /* Tùy chỉnh nhỏ để nút bấm trông đẹp hơn và bỏ viền xanh khó chịu khi click */
        .accordion-button:focus {
            box-shadow: none;
            border-color: rgba(0,0,0,.125);
        }
        .accordion-button:not(.collapsed) {
            color: #0d6efd;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 text-dark">Danh sách Đơn Thuốc Đã Kê</h2>
        <a th:href="@{/doctor/home}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Quay lại Home
        </a>
    </div>

    <!-- Thông báo nếu không có đơn thuốc nào -->
    <div th:if="${#lists.isEmpty(prescriptions)}" class="alert alert-info text-center shadow-sm" role="alert">
        Bạn chưa kê đơn thuốc nào.
    </div>

    <!-- Accordion bọc ngoài toàn bộ danh sách -->
    <div class="accordion shadow-sm" id="prescriptionAccordion" th:unless="${#lists.isEmpty(prescriptions)}">

        <!-- Vòng lặp từng Đơn thuốc (Biến thành các mục thu gọn) -->
        <div class="accordion-item mb-3 border rounded shadow-sm" th:each="p : ${prescriptions}">

            <!-- TIÊU ĐỀ (Header) - Thanh xổ xuống -->
            <h2 class="accordion-header" th:id="'heading' + ${p.id}">
                <!-- Nút bấm. Chú ý thuộc tính data-bs-toggle và data-bs-target -->
                <button class="accordion-button collapsed bg-white text-dark fw-medium rounded" type="button"
                        data-bs-toggle="collapse"
                        th:data-bs-target="'#collapse' + ${p.id}"
                        aria-expanded="false"
                        th:aria-controls="'collapse' + ${p.id}">

                    <!-- Nội dung thanh tiêu đề hiển thị cho bác sĩ xem -->
                    <div class="d-flex justify-content-between align-items-center w-100 pe-3">
                        <div>
                            <span class="text-primary me-2 fw-bold">Mã đơn: #<span th:text="${p.id}"></span></span>
                            <span class="d-none d-md-inline text-muted mx-1">|</span>
                            <span class="ms-1 text-muted">
                                <i class="bi bi-person-circle"></i> Bệnh nhân:
                                <span class="text-dark fw-bold" th:text="${p.appointment?.patient?.fullName ?: 'Chưa cập nhật'}"></span>
                            </span>
                        </div>
                        <div>
                            <!-- Trạng thái -->
                            <span th:if="${p.status == 'pending'}" class="badge bg-warning text-dark px-3 py-2 rounded-pill"><i class="bi bi-clock-history"></i> Chờ duyệt</span>
                            <span th:if="${p.status == 'accepted'}" class="badge bg-success px-3 py-2 rounded-pill"><i class="bi bi-check2-circle"></i> Đã cấp thuốc</span>
                            <span th:if="${p.status == 'rejected'}" class="badge bg-danger px-3 py-2 rounded-pill"><i class="bi bi-x-circle"></i> Đã hủy</span>
                        </div>
                    </div>
                </button>
            </h2>

            <!-- PHẦN NỘI DUNG XỔ XUỐNG (Body) -->
            <!-- Thuộc tính data-bs-parent giúp mở 1 cái thì đóng cái kia lại -->
            <div th:id="'collapse' + ${p.id}" class="accordion-collapse collapse"
                 th:aria-labelledby="'heading' + ${p.id}"
                 data-bs-parent="#prescriptionAccordion">

                <div class="accordion-body bg-light border-top p-4">

                    <!-- Nút Sửa đặt ở góc trên bên phải -->
                    <div class="text-end mb-3">
                        <a th:if="${p.status == 'pending'}"
                           th:href="@{/doctor/prescriptions/edit/{id}(id=${p.id})}"
                           class="btn btn-warning btn-sm shadow-sm fw-bold text-dark">
                            <i class="bi bi-pencil-square"></i> Sửa Đơn Thuốc
                        </a>
                    </div>

                    <!-- Lưới thông tin Bệnh nhân, Chẩn đoán và Triệu chứng -->
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="p-3 border rounded h-100 bg-white shadow-sm border-start border-primary border-4">
                                <small class="text-muted text-uppercase fw-bold d-block mb-1">Lý do khám (Triệu chứng)</small>
                                <span class="text-dark" th:text="${p.appointment?.reasonForVisit ?: 'Không có'}"></span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="p-3 border rounded h-100 bg-white shadow-sm border-start border-danger border-4">
                                <small class="text-muted text-uppercase fw-bold d-block mb-1">Chẩn đoán</small>
                                <span class="text-dark" th:text="${p.appointment?.medicalRecord?.diagnosis ?: 'Chưa cập nhật'}"></span>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="p-3 border rounded bg-white shadow-sm border-start border-info border-4">
                                <small class="text-muted text-uppercase fw-bold d-block mb-1">Lời dặn của bác sĩ (Note)</small>
                                <span class="text-dark" th:text="${p.note ?: 'Không có lời dặn thêm'}"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Bảng chi tiết thuốc -->
                    <h6 class="fw-bold mb-3 pb-2 text-primary border-bottom border-primary"><i class="bi bi-capsule"></i> Chi tiết Thuốc kê đơn</h6>
                    <div class="table-responsive shadow-sm rounded">
                        <table class="table table-bordered table-hover align-middle mb-0 bg-white">
                            <thead class="table-light">
                            <tr>
                                <th scope="col" class="text-center" style="width: 5%">STT</th>
                                <th scope="col" style="width: 45%">Tên Thuốc</th>
                                <th scope="col" class="text-center" style="width: 15%">Số Lượng</th>
                                <th scope="col" style="width: 35%">Liều Dùng</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="detail, iterStat : ${p.prescriptionDetails}">
                                <td class="text-center text-muted fw-bold" th:text="${iterStat.count}"></td>
                                <td class="fw-bold text-dark" th:text="${detail.medicine?.name}"></td>
                                <td class="text-center" th:text="${detail.quantity}"></td>
                                <td th:text="${detail.dosage}" class="text-secondary"></td>
                            </tr>
                            <!-- Dòng trống nếu chưa kê thuốc nào (đề phòng lỗi) -->
                            <tr th:if="${#lists.isEmpty(p.prescriptionDetails)}">
                                <td colspan="4" class="text-center text-muted fst-italic">Đơn thuốc này chưa có thuốc nào.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>
        <!-- Kết thúc vòng lặp -->

    </div>
</div>

<!-- Bootstrap 5 JS Bundle (Bắt buộc phải có để Accordion có thể xổ xuống được) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

</body>
</html>
