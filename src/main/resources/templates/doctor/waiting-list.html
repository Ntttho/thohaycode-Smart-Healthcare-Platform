<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{fragment/fragment :: header-doctor}"></div>

<div class="container mt-5">
    <h2 class="mb-4">Danh sách chờ khám bệnh</h2>

    <table class="table table-hover table-bordered">
        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>Bệnh nhân</th>
            <th>Ngày khám</th>
            <th>Giờ khám</th>
            <th>Lý do</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="app : ${appointments}">
            <td th:text="${app.id}">1</td>
            <!-- Lấy fullName từ đối tượng patient -->
            <td th:text="${app.patient.fullName}">Nguyễn Văn A</td>

            <!-- Định dạng lại LocalDateTime -->
            <td th:text="${#temporals.format(app.startAt, 'dd-MM-yyyy')}">20/05/2026</td>
            <td th:text="${#temporals.format(app.startAt, 'HH:mm')}">09:00</td>

            <td th:text="${app.reasonForVisit}">Đau đầu</td>
            <td>
                <span class="badge"
                      th:text="${app.status}"
                      th:classappend="${
                          app.status == 'pending' ? 'bg-warning text-dark' :
                          (app.status == 'confirmed' ? 'bg-primary text-white' :
                          (app.status == 'completed' ? 'bg-success text-white' :
                          (app.status == 'cancelled' ? 'bg-danger text-white' : 'bg-secondary')))
                      }">
                    STATUS
                </span>
            </td>
            <td>
                <!-- Nút kích hoạt Modal Xác nhận -->
                <button type="button" class="btn btn-success btn-sm"
                        th:if="${app.status == 'pending'}"
                        onclick="openModal('confirm', this.getAttribute('data-id'))"
                        th:data-id="${app.id}">Xác nhận</button>


                <!-- Nút kích hoạt Modal Hoàn thành -->
                <button type="button" class="btn btn-primary btn-sm"
                        th:if="${app.status == 'confirmed'}"
                        onclick="openModal('completed', this.getAttribute('data-id'))"
                        th:data-id="${app.id}">Hoàn thành</button>

                <!-- Nút Từ chối -->
                <a th:href="@{'/doctor/waiting-list/reject/' + ${app.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc chắn muốn từ chối lịch hẹn này?')">Từ chối</a>

            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(appointments)}">
            <td colspan="7" class="text-center">Hiện tại không có lịch hẹn nào.</td>
        </tr>
        </tbody>
    </table>
</div>

<div class="modal fade" id="timeModalConfirm" tabindex="-1">
    <div class="modal-dialog">
        <form id="actionFormConfirm" method="POST">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle1">Xác nhận thời gian dự kiến hoàn thành</h5>
                </div>
                <div class="modal-body">
                    <label>Thời gian kết thúc dự kiến:</label>
                    <input type="datetime-local" name="endTime" class="form-control" required>                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary">Xác nhận</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
<script>
    function openModal(action, id) {
        const form = document.getElementById('actionFormConfirm');
        form.action = '/doctor/waiting-list/' + action + '/' + id;
        new bootstrap.Modal(document.getElementById('timeModalConfirm')).show();
    }
</script>
</body>
</html>
