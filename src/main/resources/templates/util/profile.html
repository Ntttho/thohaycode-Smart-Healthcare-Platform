<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hồ sơ cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="mb-4 text-center">Thông tin cá nhân</h3>

                    <div th:if="${param.success}" class="alert alert-success">Cập nhật thành công!</div>
                    <div th:if="${param.error}" class="alert alert-error">Cập nhật không thành công!</div>

                    <form th:action="@{/profile}" th:object="${user}" method="post">
<!--                        <input type="hidden" th:field="*{id}">-->

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Email (Không thể thay đổi)</label>
                                <input type="email" class="form-control" th:field="*{email}" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                       th:field="*{fullName}">

                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}">
                                    <span th:text="${#fields.errors('fullName')[0]}"></span>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Số điện thoại</label>
                                <input type="tel" class="form-control"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                       th:field="*{phone}">

                                <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}">
                                    <span th:text="${#fields.errors('phone')[0]}"></span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Ngày sinh</label>
                                <input type="date" class="form-control" th:field="*{dob}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giới tính</label>
                            <select class="form-select" th:field="*{gender}">
                                <option value="Male" th:selected="*{gender == 'Male'}">Nam</option>
                                <option value="Female" th:selected="*{gender == 'Female'}">Nữ</option>
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Vai trò hệ thống</label>
                                <input type="text" class="form-control bg-light"
                                       th:field="*{role}" readonly>
                            </div>

                            <div class="col-md-6" th:if="${user.role != null && user.role.toLowerCase() == 'doctor'}">
                                <label class="form-label">Khoa công tác</label>
                                <input type="text" class="form-control bg-light"
                                       th:field="*{departmentId}" readonly>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                            <a th:href="@{/}" class="btn btn-link mt-2">Quay lại trang chủ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
